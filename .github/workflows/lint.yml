name: Linting (MyPy & Flake8)

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10" # Ajuste selon ta version de projet

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy flake8
          # Si tu as un fichier requirements.txt, décommente la ligne suivante :
          # pip install -r requirements.txt

      - name: Run MyPy
        run: |
          mypy . --warn-return-any \
                 --warn-unused-ignores \
                 --ignore-missing-imports \
                 --disallow-untyped-defs \
                 --check-untyped-defs

      - name: Run Flake8
        run: |
          flake8 .
