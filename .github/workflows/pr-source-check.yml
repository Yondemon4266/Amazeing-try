name: Check pull request source branch

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main
  workflow_dispatch: # <--- AJOUTE CETTE LIGNE (très important pour le test)

jobs:
  check-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Check branches
        run: |
          if [ "${{ github.head_ref }}" != "dev" ] && [ "${{ github.base_ref }}" == "main" ]; then
            echo "ERREUR : Les pull requests vers 'main' sont uniquement autorisées depuis la branche 'dev'."
            echo "Branche source détectée : ${{ github.head_ref }}"
            exit 1
          fi
