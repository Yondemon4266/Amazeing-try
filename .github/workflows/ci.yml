name: Python Quality and Workflow Check

on:
  push:
    branches: [ main, dev ]
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [ main, dev ]
  workflow_dispatch: # Permet le lancement manuel pour le test

jobs:
  # JOB 1 : Vérification de la source (Git Flow)
  check-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Check branches
        run: |
          # On ne bloque que si la cible est 'main' et la source n'est pas 'dev'
          if [ "${{ github.base_ref }}" == "main" ] && [ "${{ github.head_ref }}" != "dev" ]; then
            echo "ERREUR : Les PR vers 'main' doivent obligatoirement venir de 'dev'."
            exit 1
          fi

  # JOB 2 : Qualité du code (Tests, Linting, Types)
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 mypy pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Mypy
      run: |
        mypy . --warn-return-any --warn-unused-ignores --ignore-missing-imports --disallow-untyped-defs --check-untyped-defs

    - name: Run Pytest
      run: |
        pytest

  # JOB 3 : Création automatique de la PR (uniquement au push sur dev)
  create-auto-pr:
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Pull Request if none exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Vérifier si une PR ouverte existe déjà de dev vers main
          pr_exists=$(gh pr list --base main --head dev --json number --status open --jq '.[0].number')
          
          if [ -z "$pr_exists" ]; then
            gh pr create \
              --base main \
              --head dev \
              --title "Release: dev to main" \
              --body "PR générée automatiquement après push sur dev."
          else
            echo "Une PR existe déjà (Numéro: $pr_exists). Pas besoin d'en créer une nouvelle."
          fi
